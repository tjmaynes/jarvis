---
- name: Set service user
  ansible.builtin.set_fact:
    openclaw_user: "{{ openclaw_user }}"

- name: Install additional packages for service user
  ansible.builtin.apt:
    name:
      - stow
    state: present

- name: Get service user UID
  ansible.builtin.command: id -u {{ openclaw_user }}
  register: openclaw_user_uid
  changed_when: false

- name: Enable lingering for service user # noqa: command-instead-of-module
  ansible.builtin.command: loginctl enable-linger {{ openclaw_user }}
  changed_when: false

- name: Ensure OpenClaw config directory exists
  ansible.builtin.file:
    path: /home/{{ openclaw_user }}/.openclaw
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0700"

- name: Check if openclaw daemon is installed # noqa: command-instead-of-module
  ansible.builtin.command: systemctl --user list-unit-files openclaw-gateway.service
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    XDG_RUNTIME_DIR: /run/user/{{ openclaw_user_uid.stdout }}
    DBUS_SESSION_BUS_ADDRESS: unix:path=/run/user/{{ openclaw_user_uid.stdout }}/bus
  register: openclaw_service_check
  changed_when: false
  failed_when: false

- name: Install openclaw daemon
  ansible.builtin.command: openclaw daemon install
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    HOME: /home/{{ openclaw_user }}
    PATH: /home/{{ openclaw_user }}/.local/bin:/usr/local/bin:/usr/bin:/bin
    XDG_RUNTIME_DIR: /run/user/{{ openclaw_user_uid.stdout }}
    DBUS_SESSION_BUS_ADDRESS: unix:path=/run/user/{{ openclaw_user_uid.stdout }}/bus
  changed_when: true
  when: "'openclaw-gateway.service' not in openclaw_service_check.stdout"

- name: Ensure environment.d directory exists
  ansible.builtin.file:
    path: /home/{{ openclaw_user }}/.config/environment.d
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0755"

- name: Set Discord bot token environment
  ansible.builtin.copy:
    dest: /home/{{ openclaw_user }}/.config/environment.d/discord.conf
    content: |
      OPENCLAW_DISCORD_TOKEN={{ discord_bot_token }}
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0600"
  no_log: true
  notify: Restart openclaw
