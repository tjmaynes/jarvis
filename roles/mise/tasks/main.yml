---
- name: Set mise user
  ansible.builtin.set_fact:
    _mise_user: "{{ mise_user }}"

- name: Add mise GPG key
  ansible.builtin.get_url:
    url: https://mise.jdx.dev/gpg-key.pub
    dest: /etc/apt/keyrings/mise-archive-keyring.pub
    mode: "0644"

- name: Add mise apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/mise.list
    # yamllint disable-line rule:line-length
    content: >-
      deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.pub
      arch={{ ansible_architecture | regex_replace('aarch64', 'arm64') | regex_replace('x86_64', 'amd64') }}]
      https://mise.jdx.dev/deb stable main
    mode: "0644"

- name: Install mise
  ansible.builtin.apt:
    name: mise
    state: present
    update_cache: true

- name: Create mise config directory
  ansible.builtin.file:
    path: "/home/{{ _mise_user }}/.config/mise"
    state: directory
    owner: "{{ _mise_user }}"
    group: "{{ _mise_user }}"
    mode: "0755"

- name: Write mise config
  ansible.builtin.copy:
    dest: "/home/{{ _mise_user }}/.config/mise/config.toml"
    content: |
      [tools]
      node = "{{ mise_node_version }}"
      python = "{{ mise_python_version }}"
      go = "{{ mise_go_version }}"
      direnv = "{{ mise_direnv_version }}"
      just = "{{ mise_just_version }}"
      {% if mise_bun_version is defined %}
      bun = "{{ mise_bun_version }}"
      {% endif %}
    owner: "{{ _mise_user }}"
    group: "{{ _mise_user }}"
    mode: "0644"
  register: mise_config

- name: Install mise runtimes
  ansible.builtin.command: mise install --yes
  become: true
  become_user: "{{ _mise_user }}"
  environment:
    HOME: "/home/{{ _mise_user }}"
    MISE_YES: "1"
  changed_when: mise_config.changed
