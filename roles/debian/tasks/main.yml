---
- name: Set service user
  ansible.builtin.set_fact:
    debian_user: "{{ debian_user }}"

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ hostname }}"

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Install base packages
  ansible.builtin.apt:
    name:
      - acl
      - git
      - curl
      - ca-certificates
      - build-essential
      - openssh-server
      - vim
      - tmux
    state: present
    update_cache: true

- name: Add GitHub CLI GPG key
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: "0644"

- name: Add GitHub CLI apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/github-cli.list
    # yamllint disable-line rule:line-length
    content: >-
      deb [arch={{ ansible_architecture | regex_replace('aarch64', 'arm64') | regex_replace('x86_64', 'amd64') }}
      signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg]
      https://cli.github.com/packages stable main
    mode: "0644"

- name: Install GitHub CLI
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: true

- name: Enable and start SSH
  ansible.builtin.systemd:
    name: ssh
    enabled: true
    state: started

- name: Check if service user exists
  ansible.builtin.command: id -u {{ debian_user }}
  register: debian_user_check
  changed_when: false
  failed_when: false

- name: Create service user
  ansible.builtin.user:
    name: "{{ debian_user }}"
    create_home: true
    home: "/home/{{ debian_user }}"
    shell: /bin/bash
  when: debian_user_check.rc != 0

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present

- name: Enable unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: "0644"

- name: Configure unattended-upgrades policy
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}-security";
        "${distro_id}ESMApps:${distro_codename}-apps-security";
        "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
    mode: "0644"
