---
- name: Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ claude_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ claude_user_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ claude_user_uid.stdout }}/bus"

- name: Restart claude
  ansible.builtin.systemd_service:
    name: claude-code.service
    state: restarted
    scope: user
  become: true
  become_user: "{{ claude_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ claude_user_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ claude_user_uid.stdout }}/bus"
